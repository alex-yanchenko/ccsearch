name: Release

# release-please maintains a "chore(main): release X.Y.Z" PR off main: it bumps the
# version in pyproject.toml and writes the CHANGELOG from Conventional Commit messages.
# Merging that PR creates a DRAFT GitHub release; this same job then builds the sdist +
# wheel and attaches them with provenance attestation, so the draft is ready to ship.
# Publishing the draft (a manual click) creates the git tag and triggers publish.yml,
# which pushes to PyPI via trusted publishing.
on:
  push:
    branches: [main]

# Serialize releases: only one run at a time. A second push while a run is mid-flight
# queues behind it (cancel-in-progress: false) rather than racing on the release PR /
# draft. We do NOT cancel the in-progress run — killing it mid-build could leave a
# half-populated draft.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Build-provenance attestation for the release assets: id-token mints the OIDC
  # identity the attestation is signed with; attestations writes it to the store that
  # `gh attestation verify` checks.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token from the dedicated release GitHub App so
      # PR creation is scoped to THIS workflow's token. The token also makes the release
      # PR trigger CI (PRs opened by the default GITHUB_TOKEN don't).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # uv.lock records the project's own version, and release-please bumps only
      # pyproject.toml — without this refresh, `uv sync --locked` fails CI on every
      # release PR. Runs whenever release-please created/updated the release PR.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: astral-sh/setup-uv@v7
        if: ${{ steps.release.outputs.prs_created == 'true' }}
      - name: Sync uv.lock on the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          uv lock
          if ! git diff --quiet uv.lock; then
            git config user.name "alex-release-bot[bot]"
            git config user.email "alex-release-bot[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: sync uv.lock with release version"
            git push
          fi

      # The rest runs ONLY when a release PR was just merged (a draft release now exists).
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: astral-sh/setup-uv@v7
        if: ${{ steps.release.outputs.release_created }}
      - if: ${{ steps.release.outputs.release_created }}
        run: uv build
      - name: Attest build provenance for the release assets
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Attach sdist + wheel to the draft release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist/* --clobber
      # Keep exactly one unpublished draft. Merging successive release PRs without
      # publishing the prior draft would otherwise leave a stack of stale drafts.
      # Drafts carry no git tag, so this never deletes a tag or a published release.
      - name: Prune stale draft releases (keep only the new one)
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new_tag="${{ steps.release.outputs.tag_name }}"
          gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | .tagName' \
          | while read -r tag; do
              if [ "$tag" != "$new_tag" ]; then
                echo "Deleting stale draft $tag"
                gh release delete "$tag" --repo "${{ github.repository }}" --yes
              fi
            done
